services:
  - type: web
    name: studentflow-bot-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRES_MINUTES
        value: 43200
      - key: MINI_APP_URL
        value: https://temporary.vercel.app
      - key: BACKEND_CORS_ORIGINS
        value: https://temporary.vercel.app
      - key: ENABLE_INTEGRATED_SCHEDULER
        value: true
      - key: PYTHON_VERSION
        value: 3.12.8
