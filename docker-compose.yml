services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studentflow
      POSTGRES_USER: studentflow
      POSTGRES_PASSWORD: studentflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studentflow -d studentflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend: &backend
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://studentflow:studentflow@postgres:5432/studentflow
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  bot:
    <<: *backend
    profiles: ["telegram"]
    ports: []
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m app.bot.main

  scheduler:
    <<: *backend
    profiles: ["telegram"]
    ports: []
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m app.scheduler.worker

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
